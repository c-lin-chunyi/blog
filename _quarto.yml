project:
  type: website

  resources:
    - "pgp_clin.asc.txt"
    - "html/fonts/"
    - "html/vendor/"

freeze: auto

pagetitle: "{{< meta title >}} | Chunyi Lin"
author-meta: "Chunyi Lin"

# Date format
date-format: "dddd, MMMM D, YYYY"

website:
  description: "Chunyi Lin is an undergraduate psychology student at Zhejiang University, with his research interests in cognitive sciences."
  favicon: favicon.svg
  site-url: https://www.chunyi-lin.com
  repo-url: "https://github.com/c-lin-chunyi/blog"
  title: "Chunyi Lin"

  llms-txt: true

  navbar:
    logo: logo.svg
    pinned: true
    left:
      - text: CV
        href: cv/index.qmd
      - text: Posts
        href: posts/index.qmd
      - text: AI Usage Disclosure
        href: ai/index.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/chunyi-lin-630945380/
      - icon: github
        href: https://github.com/c-lin-chunyi
  page-footer:
    left: |
      <span class="faux-block">{{< fa brands creative-commons >}} {{< var years >}} {{< var author-name >}}</span>
      <span class="faux-block">All content licensed under<br>[{{< fa brands creative-commons >}} {{< fa brands creative-commons-by >}} Creative Commons {{< var license.name >}}]({{< var license.url >}})</span>
    center: |
      <span class="faux-block">{{< fa brands orcid >}} <strong>ORCID</strong> [{{< var orcid >}}](https://orcid.org/{{< var orcid >}})</span>
      <span class="faux-block">{{< fa key >}} [PGP public key]({{< var pgp.key >}}) &emsp; {{< fa fingerprint >}} <strong>Fingerprint:</strong><br><span class="fingerprint">{{< var pgp.fingerprint >}}</span></span>
    right: |
      <div class="faux-block">Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/)</div>
      <div class="faux-block">[View the source at {{< fa brands github >}} GitHub](https://github.com/c-lin-chunyi/blog)</div>
      <div class="faux-block"><div class="theme-switcher dropdown" data-theme-switcher><button class="theme-switcher-trigger" type="button" id="theme-switcher-button" data-theme-switcher-trigger data-bs-toggle="dropdown" aria-expanded="false" aria-label="Color theme"><i class="fa-solid fa-desktop theme-switcher-icon" data-theme-switcher-icon aria-hidden="true"></i><span class="theme-switcher-label" data-theme-switcher-label>System</span></button><ul class="dropdown-menu theme-switcher-menu" aria-labelledby="theme-switcher-button"><li><button class="dropdown-item theme-switcher-option" type="button" data-theme-switcher-option data-theme-value="light"><i class="fa-solid fa-sun" aria-hidden="true"></i><span>Light</span><i class="fa-solid fa-check theme-switcher-check" aria-hidden="true"></i></button></li><li><button class="dropdown-item theme-switcher-option" type="button" data-theme-switcher-option data-theme-value="dark"><i class="fa-solid fa-moon" aria-hidden="true"></i><span>Dark</span><i class="fa-solid fa-check theme-switcher-check" aria-hidden="true"></i></button></li><li><button class="dropdown-item theme-switcher-option" type="button" data-theme-switcher-option data-theme-value="system"><i class="fa-solid fa-desktop" aria-hidden="true"></i><span>System</span><i class="fa-solid fa-check theme-switcher-check" aria-hidden="true"></i></button></li></ul></div></div>

format:
  html:
    theme:
      light: html/light.scss
      dark: html/dark.scss
    template-partials:
      - html/metadata.html
    respect-user-color-scheme: true
    html-math-method:
      method: mathjax
      url: "html/vendor/mathjax-4.0.0/startup.js"
    include-in-header:
      - html/fonts.html
      - html/mathjax-stix.html
      - html/theme-toggle.html
    include-after-body:
      - html/giscus.html
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
