# Options specified here will apply to all posts in this folder

date-modified: last-modified
modified-title: Last updated

# Enable banner style title blocks
title-block-banner: true

# Add blog-post class to the banner header area
format:
  html:
    code-tools: true
    quarto-template-params:
      banner-header-class: "blog-post"
    comments:
      giscus: 
        repo: c-lin-chunyi/blog
        category: Blog comments
        category-id: DIC_kwDOSGBNys4C7Uf1
        mapping: pathname

# Default for table of contents
toc: true
toc-title: Contents
toc-location: left

# Default author
author:
  - name: Chunyi Lin
    url: https://www.chunyi-lin.com/
    orcid: 0009-0008-9762-8705
