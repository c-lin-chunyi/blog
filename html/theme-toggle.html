<script>
  (function () {
    const selector = ".quarto-color-scheme-toggle";
    const toggleLabel = "Toggle light/dark switch";

    const toggleColorSchemeWithoutScrollJump = function () {
      if (!window.quartoToggleColorScheme) {
        return;
      }

      const x = window.scrollX;
      const y = window.scrollY;
      const originalScrollTo = window.scrollTo;

      const guardedScrollTo = function () {
        const targetX = typeof arguments[0] === "object" ? arguments[0].left : arguments[0];
        const targetY = typeof arguments[0] === "object" ? arguments[0].top : arguments[1];

        if (targetX === 0 && (targetY === 0 || targetY === 1)) {
          return;
        }

        return originalScrollTo.apply(window, arguments);
      };

      window.scrollTo = guardedScrollTo;

      try {
        window.quartoToggleColorScheme();
      } finally {
        originalScrollTo.call(window, x, y);
        window.requestAnimationFrame(function () {
          originalScrollTo.call(window, x, y);
        });
        window.setTimeout(function () {
          if (window.scrollTo === guardedScrollTo) {
            window.scrollTo = originalScrollTo;
          }
          originalScrollTo.call(window, x, y);
        }, 80);
      }
    };

    window.document.addEventListener("DOMContentLoaded", function () {
      window.document.querySelectorAll(selector).forEach(function (toggle) {
        toggle.removeAttribute("href");
        toggle.setAttribute("role", "button");
        toggle.setAttribute("tabindex", "0");
        toggle.setAttribute("title", toggleLabel);
        toggle.setAttribute("aria-label", toggleLabel);
      });
    });

    window.document.addEventListener("click", function (event) {
      const toggle = event.target.closest(selector);
      if (!toggle) {
        return;
      }

      event.preventDefault();
      event.stopImmediatePropagation();

      toggleColorSchemeWithoutScrollJump();
    }, true);

    window.document.addEventListener("keydown", function (event) {
      const toggle = event.target.closest(selector);
      if (!toggle || (event.key !== "Enter" && event.key !== " ")) {
        return;
      }

      event.preventDefault();
      event.stopImmediatePropagation();

      toggleColorSchemeWithoutScrollJump();
    }, true);
  }());
</script>
