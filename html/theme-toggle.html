<style>
  .quarto-color-scheme-toggle {
    display: none !important;
  }

  .theme-switcher {
    display: inline-block;
    margin: 0.12rem 0 0;
  }

  .theme-switcher-trigger {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.38rem 0.82rem;
    border: 1px solid color-mix(in srgb, currentColor 24%, transparent);
    border-radius: 999px;
    background: transparent;
    color: inherit;
    font: inherit;
    font-size: 0.875rem;
    line-height: 1;
    cursor: pointer;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .theme-switcher-trigger:hover,
  .theme-switcher-trigger:focus-visible {
    border-color: var(--bs-link-hover-color, currentColor);
    color: var(--bs-link-hover-color, inherit);
  }

  .theme-switcher-trigger:focus-visible {
    outline: 2px solid currentColor;
    outline-offset: 2px;
  }

  .theme-switcher-icon {
    font-size: 0.95em;
    opacity: 0.85;
  }

  .theme-switcher-menu {
    min-width: 8.75rem;
    margin-top: 0.45rem;
    padding: 0.4rem;
    border-radius: 0.75rem;
    border: 1px solid var(--bs-border-color, rgba(128, 128, 128, 0.3));
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    color: inherit;
  }

  html[data-theme="dark"] .theme-switcher-menu {
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
  }

  .theme-switcher-option {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    width: 100%;
    padding: 0.46rem 0.62rem;
    border: 0;
    border-radius: 0.5rem;
    background: transparent;
    color: inherit;
    font-size: 0.875rem;
    text-align: left;
    cursor: pointer;
  }

  .theme-switcher-option > i:first-child {
    width: 0.95em;
    font-size: 0.9em;
    text-align: center;
    opacity: 0.85;
  }

  .theme-switcher-option,
  .theme-switcher-option:active {
    color: inherit;
  }

  .theme-switcher-option.active {
    color: #fff;
    background: var(--bs-primary);
  }

  .theme-switcher-option.active > i:first-child,
  .theme-switcher-option.active .theme-switcher-check {
    opacity: 1;
  }

  .theme-switcher-check {
    margin-left: auto;
    font-size: 0.75em;
    opacity: 0;
  }

  .theme-switcher-option.active .theme-switcher-check {
    opacity: 0.85;
  }

  .theme-switcher-option:hover,
  .theme-switcher-option:focus-visible {
    background: transparent;
    color: var(--bs-emphasis-color, currentColor);
    outline: none;
  }

  .theme-switcher-option.active:hover,
  .theme-switcher-option.active:focus-visible {
    background: var(--bs-primary);
    color: #fff;
  }

  html[data-theme="dark"] .theme-switcher-option:hover,
  html[data-theme="dark"] .theme-switcher-option:focus-visible {
    color: #fff;
  }
</style>

<script>
  (function () {
    const theme = window.__themeBootstrap;
    if (!theme) return;

    const DARK_MEDIA = theme.darkMedia;
    const SELECTORS = {
      switcher: "[data-theme-switcher]",
      trigger: "[data-theme-switcher-trigger]",
      icon: "[data-theme-switcher-icon]",
      label: "[data-theme-switcher-label]",
      option: "[data-theme-switcher-option]"
    };
    const ICONS = {
      light: "fa-sun",
      dark: "fa-moon",
      system: "fa-desktop"
    };
    const LABELS = {
      light: "Light",
      dark: "Dark",
      system: "System"
    };
    const NO_SCROLL_RESTORE_KEY = "theme-toggle-no-scroll-restore";

    function setManualScrollRestoration() {
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "manual";
      }
    }

    function setAutoScrollRestoration() {
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "auto";
      }
    }

    function scrollToTop() {
      window.scrollTo(0, 0);
    }

    function resetScrollAfterThemeReload() {
      let shouldResetScroll = false;

      try {
        shouldResetScroll = window.sessionStorage.getItem(NO_SCROLL_RESTORE_KEY) === "true";
        if (shouldResetScroll) {
          window.sessionStorage.removeItem(NO_SCROLL_RESTORE_KEY);
        }
      } catch (_) {}

      if (!shouldResetScroll) return;

      setManualScrollRestoration();
      scrollToTop();

      window.addEventListener("pageshow", scrollToTop, { once: true });
      window.addEventListener("load", function () {
        window.requestAnimationFrame(function () {
          scrollToTop();
          window.setTimeout(function () {
            scrollToTop();
            setAutoScrollRestoration();
          }, 100);
        });
      }, { once: true });
    }

    function reloadWithoutScrollRestoration() {
      try {
        window.sessionStorage.setItem(NO_SCROLL_RESTORE_KEY, "true");
      } catch (_) {}

      setManualScrollRestoration();
      window.location.reload();
    }

    resetScrollAfterThemeReload();

    function getSwitcherElements() {
      const switcher = document.querySelector(SELECTORS.switcher);
      if (!switcher) return null;

      return {
        icon: switcher.querySelector(SELECTORS.icon),
        label: switcher.querySelector(SELECTORS.label),
        options: Array.from(switcher.querySelectorAll(SELECTORS.option)),
        trigger: switcher.querySelector(SELECTORS.trigger)
      };
    }

    function updateTriggerUI(preference) {
      const elements = getSwitcherElements();
      if (!elements?.trigger) return;

      if (elements.icon) {
        elements.icon.classList.remove("fa-sun", "fa-moon", "fa-desktop");
        elements.icon.classList.add(ICONS[preference]);
      }

      if (elements.label) {
        elements.label.textContent = LABELS[preference];
      }

      elements.options.forEach(function (option) {
        option.classList.toggle("active", option.dataset.themeValue === preference);
      });
    }

    function applyThemePreference(preference) {
      const resolved = theme.resolveTheme(preference);
      theme.applyTheme(resolved, preference);
      updateTriggerUI(preference);
      return resolved;
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll(".quarto-color-scheme-toggle").forEach(function (el) {
        el.remove();
      });

      document.querySelectorAll(".quarto-navbar-tools").forEach(function (tools) {
        if (!tools.children.length) {
          tools.remove();
        }
      });

      const currentPreference = document.documentElement.dataset.themePreference
        || theme.readThemePreference();
      applyThemePreference(currentPreference);

      const elements = getSwitcherElements();
      if (!elements) return;

      elements.options.forEach(function (option) {
        option.addEventListener("click", function () {
          const nextPreference = option.dataset.themeValue;
          if (!theme.VALID_PREFERENCES.includes(nextPreference)) return;

          theme.writeThemePreference(nextPreference);

          applyThemePreference(nextPreference);
          reloadWithoutScrollRestoration();
        });
      });
    });

    DARK_MEDIA?.addEventListener("change", function () {
      const currentPreference = theme.readThemePreference();
      if (currentPreference === "system") {
        applyThemePreference("system");
      }
    });
  }());
</script>
