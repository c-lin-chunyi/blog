<meta charset="utf-8" />
$if(quarto-version)$
<meta name="generator" content="quarto-$quarto-version$" />
$else$
<meta name="generator" content="quarto" />
$endif$

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

$for(author-meta)$
<meta name="author" content="$author-meta$" />
$endfor$
$if(date-meta)$
<meta name="dcterms.date" content="$date-meta$" />
$endif$
$if(keywords)$
<meta name="keywords" content="$for(keywords)$$keywords$$sep$, $endfor$" />
$endif$
$if(description-meta)$
<meta name="description" content="$description-meta$" />
$endif$

<title>$pagetitle$$if(title-prefix)$ – $title-prefix$$endif$</title>

<style>
  /*
   * Critical navbar sizing. This ships before external CSS so slow network
   * loads do not briefly paint a short navbar and then shift the page down
   * when the logo/theme CSS arrives.
   */
  :root {
    --theme-navbar-logo-size: 48px;
    --theme-navbar-fixed-offset: 77px;
  }

  #quarto-header,
  #quarto-header > nav.navbar {
    min-height: var(--theme-navbar-fixed-offset);
  }

  body.nav-fixed {
    padding-top: var(--theme-navbar-fixed-offset);
  }

  #quarto-header .navbar-logo {
    display: block;
    width: var(--theme-navbar-logo-size);
    height: var(--theme-navbar-logo-size);
    max-height: var(--theme-navbar-logo-size);
    min-width: var(--theme-navbar-logo-size);
    padding-right: 0;
    object-fit: contain;
  }

  #quarto-header .navbar-brand.navbar-brand-logo {
    display: inline-flex;
    flex: 0 0 var(--theme-navbar-logo-size);
    width: var(--theme-navbar-logo-size);
    height: var(--theme-navbar-logo-size);
    align-items: center;
    justify-content: center;
    margin-right: 0.25rem;
  }
</style>

<script>
  (function () {
    const STORAGE_KEY = "theme-preference";
    const VALID_PREFERENCES = ["light", "dark", "system"];
    const DARK_MEDIA = typeof window.matchMedia === "function"
      ? window.matchMedia("(prefers-color-scheme: dark)")
      : null;

    function readThemePreference() {
      try {
        const value = window.localStorage.getItem(STORAGE_KEY);
        if (VALID_PREFERENCES.includes(value)) {
          return value;
        }
        if (value !== null) {
          window.localStorage.removeItem(STORAGE_KEY);
        }
      } catch (_) {}

      return "system";
    }

    function resolveTheme(preference) {
      if (preference === "light" || preference === "dark") {
        return preference;
      }

      return DARK_MEDIA?.matches ? "dark" : "light";
    }

    function syncLegacyThemeState(resolved) {
      try {
        window.localStorage.setItem(
          "quarto-color-scheme",
          resolved === "dark" ? "alternate" : "default"
        );
        window.localStorage.removeItem("theme-mode-preference");
      } catch (_) {}
    }

    function setRootThemeState(resolved, preference) {
      const root = document.documentElement;

      root.dataset.theme = resolved;
      root.dataset.themePreference = preference;
      root.setAttribute("data-bs-theme", resolved);
      root.style.colorScheme = resolved;
      root.classList.remove("quarto-light", "quarto-dark");
      root.classList.add(resolved === "dark" ? "quarto-dark" : "quarto-light");
    }

    function setBodyThemeState(resolved) {
      if (!document.body) return;

      document.body.classList.toggle("quarto-dark", resolved === "dark");
      document.body.classList.toggle("quarto-light", resolved === "light");
    }

    function applyStylesheets(resolved) {
      const primarySheets = document.querySelectorAll(
        "link.quarto-color-scheme:not(.quarto-color-alternate)"
      );
      const alternateSheets = document.querySelectorAll(
        "link.quarto-color-scheme.quarto-color-alternate"
      );

      primarySheets.forEach(function (sheet) {
        if (sheet.rel !== "stylesheet") {
          sheet.rel = "stylesheet";
        }
      });

      alternateSheets.forEach(function (sheet) {
        sheet.rel = resolved === "dark" ? "stylesheet" : "disabled-stylesheet";
      });

      return primarySheets.length + alternateSheets.length > 0;
    }

    function applyTheme(resolved, preference) {
      applyStylesheets(resolved);
      syncLegacyThemeState(resolved);
      setRootThemeState(resolved, preference);
      setBodyThemeState(resolved);
      themeBootstrap.preference = preference;
      themeBootstrap.resolved = resolved;
      return resolved;
    }

    const themeBootstrap = {
      STORAGE_KEY: STORAGE_KEY,
      VALID_PREFERENCES: VALID_PREFERENCES,
      darkMedia: DARK_MEDIA,
      readThemePreference: readThemePreference,
      resolveTheme: resolveTheme,
      syncLegacyThemeState: syncLegacyThemeState,
      setRootThemeState: setRootThemeState,
      applyStylesheets: applyStylesheets,
      applyTheme: applyTheme
    };

    const preference = readThemePreference();
    const resolved = resolveTheme(preference);

    window.__themeBootstrap = themeBootstrap;
    applyTheme(resolved, preference);

    if (!themeBootstrap.applyStylesheets(resolved)) {
      const observer = new MutationObserver(function () {
        if (themeBootstrap.applyStylesheets(resolved)) {
          observer.disconnect();
        }
      });

      observer.observe(document.head || document.documentElement, {
        childList: true,
        subtree: true
      });
    }
  }());
</script>
